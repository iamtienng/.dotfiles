# ============================================================
# GENERAL
# ============================================================
start-at-login = true
automatically-unhide-macos-hidden-apps = false

# ============================================================
# NORMALIZATION
# ============================================================
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ============================================================
# LAYOUT
# ============================================================
accordion-padding = 300
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ============================================================
# CALLBACKS
# ============================================================
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ============================================================
# WINDOW RULES
# ============================================================
[[on-window-detected]]
if.app-name-regex-substring = '(?i)telegram|bitwarden|realvnc|finder'
run = 'layout floating'

# ============================================================
# KEY MAPPING
# ============================================================
[key-mapping]
preset = 'qwerty'

# ============================================================
# GAPS
# ============================================================
[gaps]
inner.horizontal = 0
inner.vertical   = 0
outer.left       = 0
outer.bottom     = 0
outer.right      = 0
outer.top        = [{ monitor.'^built-in retina display$' = 0 }, 0]

# ============================================================
# MAIN MODE
# ============================================================
[mode.main.binding]

# --- Layout ---
alt-slash       = 'layout tiles horizontal vertical'
alt-shift-slash = 'layout accordion horizontal vertical'
alt-ctrl-f      = 'layout floating'
alt-ctrl-shift-f = 'fullscreen'

# --- Focus (vim-style) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Join ---
alt-shift-left  = 'join-with left'
alt-shift-down  = 'join-with down'
alt-shift-up    = 'join-with up'
alt-shift-right = 'join-with right'

# --- Resize ---
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# --- Workspaces ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'

alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'

alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Modes ---
alt-shift-semicolon = 'mode service'
alt-shift-enter     = 'mode apps'

# ============================================================
# SERVICE MODE
# ============================================================
[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']
f         = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# ============================================================
# APPS MODE
# ============================================================
[mode.apps.binding]
alt-w = ['exec-and-forget open -a /Applications/WezTerm.app', 'mode main']
