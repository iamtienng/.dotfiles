# ─── Shell ────────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh

# ─── Terminal ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-features "tmux*:RGB"
set -g focus-events on
set -s escape-time 0

# ─── General ──────────────────────────────────────────────────────────────────
set -g history-limit 1000000
set -g display-panes-time 2000
set -g display-time 4000
set -g status-interval 1
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S"
set -g aggressive-resize on          # was set-window-option; -g is sufficient

# ─── Mouse ────────────────────────────────────────────────────────────────────
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# ─── Word Separators ──────────────────────────────────────────────────────────
set -g word-separators ' @"=()[]_-:,.'
set -ag word-separators "'"

# ─── Status Bar ───────────────────────────────────────────────────────────────
set -g status-position top
set -g status-justify centre
set -g status-left-length 200
set -g status-right-length 100
set -g status-left '#S'
set -g status-right '%H:%M %d %b %Y'  # fixed: stray % before Y

# ─── Copy Mode ────────────────────────────────────────────────────────────────
set -g mode-keys vi

unbind -T copy-mode-vi Enter
unbind -T copy-mode-vi Space
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind -T edit-mode-vi Up   send -X history-up
bind -T edit-mode-vi Down send -X history-down

# ─── Pane Sync ────────────────────────────────────────────────────────────────
bind C-s if -F '#{pane_synchronized}' \
    'setw synchronize-panes off; \
     setw pane-active-border-style fg=colour63,bg=default; \
     setw pane-border-format " #P "' \
    'setw synchronize-panes on; \
     setw pane-active-border-style fg=red; \
     setw pane-border-format " #P - Pane Synchronization ON "'

# ─── Key Bindings ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind x kill-pane                             # no confirm

bind = select-layout even-horizontal
bind | select-layout even-vertical

bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

bind -r ^ last-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r f run-shell "tmux neww $HOME/.config/scripts/tmux-sessionizer"

# ─── Appearance (mode 2031 — requires tmux 3.6+ and Ghostty) ─────────────────
set-hook -g client-light-theme 'setenv -g BACKGROUND light; source-file ~/.config/tmux/themes/github_light_colorblind.conf'
set-hook -g client-dark-theme  'setenv -g BACKGROUND dark; source-file ~/.config/tmux/themes/github_dark_colorblind.conf'

if-shell '[ "$(tmux display -p "#{client_theme}")" = "light" ]' \
    'setenv -g BACKGROUND light; source-file ~/.config/tmux/themes/github_light_colorblind.conf' \
    'setenv -g BACKGROUND dark; source-file ~/.config/tmux/themes/github_dark_colorblind.conf'
